name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Create the GitHub Release (cloud, instant) ───────────────────────
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "INVO ${{ github.ref_name }}" \
            --generate-notes \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── ESP32-P4 build (cloud runner, ESP-IDF via Docker) ───────────────
  build-esp32:
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp version into sdkconfig.defaults
        id: ver
        run: |
          VER="${GITHUB_REF_NAME#v}"
          echo "clean=${VER}" >> $GITHUB_OUTPUT
          sed -i "s/CONFIG_APP_PROJECT_VER=.*/CONFIG_APP_PROJECT_VER=\"${VER}\"/" \
            sdkconfig.defaults

      - name: Build with ESP-IDF Docker image
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/workspace \
            -w /workspace \
            -e IDF_TARGET=esp32p4 \
            espressif/idf:release-v5.3 \
            bash -c "
              idf.py reconfigure &&
              sed -i 's/#define H_SDIO_TX_BLOCK_ONLY_XFER (1)/#define H_SDIO_TX_BLOCK_ONLY_XFER (0)/' \
                managed_components/espressif__esp_hosted/host/port/esp/freertos/include/port_esp_hosted_host_config.h &&
              idf.py build
            "

      - name: Upload binary to GitHub Release
        run: |
          TAG="${{ github.ref_name }}"
          BIN="invo-esp32-${TAG}.bin"
          sudo cp build/invo-esp32.bin "$BIN"
          gh release upload "$TAG" "$BIN" --clobber
          sudo cp build/invo-esp32.bin invo-esp32.bin
          gh release upload "$TAG" invo-esp32.bin --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push binary to binaries branch (raw.githubusercontent.com FOTA)
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          BINDIR=$(mktemp -d)
          cd "$BINDIR"
          git init
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}"
          sudo cp "$GITHUB_WORKSPACE/build/invo-esp32.bin" invo-esp32.bin
          git add invo-esp32.bin
          git commit -m "chore: binary ${TAG} [skip ci]"
          git push origin HEAD:refs/heads/binaries --force
          cd -
          rm -rf "$BINDIR"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version.json and push to master
        run: |
          VER="${{ steps.ver.outputs.clean }}"
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          RAW_URL="https://raw.githubusercontent.com/${REPO}/binaries/invo-esp32.bin"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout origin/master

          printf '{\n  "version": "%s",\n  "url": "%s"\n}\n' \
            "$VER" "$RAW_URL" > version.json

          # Also write esp32/version.json at the OLD path so devices running
          # firmware built before the Pi/ESP32 split can still receive FOTA
          # and upgrade to a build that polls the new path.
          mkdir -p esp32
          cp version.json esp32/version.json

          git add version.json esp32/version.json
          if git diff --cached --quiet; then
            echo "version.json already up to date, nothing to commit"
          else
            git commit -m "chore: ESP32 version.json → ${TAG} [skip ci]"
            git push origin HEAD:refs/heads/master
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
