name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Pi 5 build (self-hosted runner on the Pi) ────────────────────────
  build-pi:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j4

      - name: Package and sign
        run: |
          VERSION=${{ github.ref_name }}
          VER_CLEAN=${VERSION#v}
          TARBALL="invo-${VERSION}.tar.gz"

          mkdir -p dist
          STAGE=$(mktemp -d)
          mkdir -p "$STAGE/bin" "$STAGE/scripts"
          cp build/bin/lvglsim            "$STAGE/bin/lvglsim"
          cp scripts/invo_bridge.py       "$STAGE/scripts/invo_bridge.py"
          cp scripts/invo-updater        "$STAGE/scripts/invo-updater"
          echo "$VER_CLEAN" > "$STAGE/version"
          tar -czf "dist/$TARBALL" -C "$STAGE" .
          rm -rf "$STAGE"

          SHA256=$(sha256sum "dist/$TARBALL" | cut -d' ' -f1)

          SIG_FILE=$(mktemp)
          openssl dgst -sha256 -sign /etc/invo/update-private.pem \
            -out "$SIG_FILE" "dist/$TARBALL"
          SIG_B64=$(base64 -w0 "$SIG_FILE")
          rm "$SIG_FILE"

          cat > dist/manifest.json <<EOF
          {
            "version": "$VER_CLEAN",
            "package": "$TARBALL",
            "sha256": "$SHA256",
            "signature": "$SIG_B64"
          }
          EOF

          echo "TARBALL=$TARBALL" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create GitHub Release
        run: |
          gh release create "$VERSION" \
            "dist/$TARBALL" \
            "dist/manifest.json" \
            --title "INVO $VERSION" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── ESP32-P4 build (cloud runner, ESP-IDF via Docker) ───────────────
  build-esp32:
    runs-on: ubuntu-latest
    needs: build-pi          # release must exist before we upload the binary
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Stamp version into sdkconfig.defaults
        id: ver
        run: |
          VER="${GITHUB_REF_NAME#v}"
          echo "clean=${VER}" >> $GITHUB_OUTPUT
          sed -i "s/CONFIG_APP_PROJECT_VER=.*/CONFIG_APP_PROJECT_VER=\"${VER}\"/" \
            esp32/sdkconfig.defaults

      - name: Build with ESP-IDF Docker image
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/workspace \
            -w /workspace/esp32 \
            -e IDF_TARGET=esp32p4 \
            espressif/idf:release-v5.3 \
            idf.py build

      - name: Upload binary to GitHub Release
        run: |
          TAG="${{ github.ref_name }}"
          BIN="invo-esp32-${TAG}.bin"
          # Docker runs as root so the file may be root-owned — copy it out
          sudo cp esp32/build/invo-esp32.bin "$BIN"
          gh release upload "$TAG" "$BIN" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update esp32/version.json and push to main
        run: |
          VER="${{ steps.ver.outputs.clean }}"
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          BIN_URL="https://github.com/${REPO}/releases/download/${TAG}/invo-esp32-${TAG}.bin"

          printf '{\n  "version": "%s",\n  "url": "%s"\n}\n' \
            "$VER" "$BIN_URL" > esp32/version.json

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git rebase origin/master
          git add esp32/version.json
          git commit -m "chore: ESP32 version.json → ${TAG} [skip ci]"
          git push origin HEAD:refs/heads/master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
